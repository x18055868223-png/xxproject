# 可选：仅当你想用 80/443 + 域名 + TLS 反代时才需要。
# 直接暴露 8000 端口的话不需要这个文件。
#
# 使用前提：把 systemd 里的 --host 改成 127.0.0.1，让 uvicorn 只听本机。
# 放到 /etc/nginx/sites-available/gexmonitorapi 并 ln -s 到 sites-enabled。

server {
    listen 80;
    server_name your.domain.example;   # 改成你的域名（没有域名就用 _ 并按 IP 访问）

    # 抓取后端可能较慢，放宽超时
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 透传 Authorization 头（默认就会透传，这里显式声明）
        proxy_set_header Authorization $http_authorization;
    }
}

# TLS：装好域名解析后用 certbot 自动改写本文件：
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d your.domain.example
