<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>信号审计文档</title>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #111111;
      --muted: #666666;
      --faint: #8a8a8a;
      --line: #dedede;
      --line-strong: #b8b8b8;
      --surface: #f7f7f7;
      --surface-2: #eeeeee;
      --focus: #000000;
      --good: #174d2a;
      --bad: #6b1d1d;
      --wait: #4d3d00;
    }

    * {
      box-sizing: border-box;
      letter-spacing: 0;
    }

    html {
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
      font-size: 15px;
      line-height: 1.55;
    }

    body {
      margin: 0;
      background: var(--bg);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      color: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: 328px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      border-right: 1px solid var(--line);
      padding: 24px 18px;
      background: var(--bg);
    }

    .brand {
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 18px;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      text-transform: uppercase;
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      font-weight: 760;
    }

    .brand p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .filter-stack {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .field-label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .control,
    .select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: var(--bg);
      color: var(--ink);
      padding: 8px 10px;
      outline: none;
    }

    .control:focus,
    .select:focus,
    .index-item:focus-visible {
      border-color: var(--focus);
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.08);
    }

    .index-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 0 10px;
    }

    .index-heading h2 {
      margin: 0;
      font-size: 13px;
      text-transform: uppercase;
    }

    .count {
      color: var(--muted);
      font-size: 12px;
    }

    .index-list {
      display: grid;
      gap: 8px;
    }

    .index-item {
      width: 100%;
      min-height: 96px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--bg);
      padding: 12px;
      text-align: left;
      cursor: pointer;
    }

    .index-item:hover {
      border-color: var(--ink);
    }

    .index-item.is-active {
      border-color: var(--ink);
      box-shadow: inset 3px 0 0 var(--ink);
    }

    .index-topline,
    .meta-row,
    .split-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .index-symbol {
      font-size: 16px;
      font-weight: 760;
    }

    .index-time {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .index-summary {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .mini-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .workspace {
      min-width: 0;
      padding: 30px 42px 48px;
    }

    .document {
      max-width: 1180px;
      margin: 0 auto;
    }

    .load-alert {
      border-left: 4px solid var(--bad);
      background: #fff7f7;
      padding: 12px 14px;
      margin-bottom: 18px;
    }

    .load-alert strong {
      display: block;
      margin-bottom: 4px;
    }

    .load-alert p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .doc-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      border-bottom: 1px solid var(--line);
      padding-bottom: 24px;
      margin-bottom: 24px;
    }

    .doc-title {
      margin: 0;
      font-size: 34px;
      line-height: 1.12;
      font-weight: 780;
    }

    .doc-subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status-stack {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: 4px 10px;
      color: var(--ink);
      background: var(--bg);
      font-size: 12px;
      font-weight: 720;
      white-space: nowrap;
    }

    .badge.is-solid {
      border-color: var(--ink);
      background: var(--ink);
      color: var(--bg);
    }

    .badge.is-good {
      border-color: rgba(23, 77, 42, 0.35);
      color: var(--good);
    }

    .badge.is-bad {
      border-color: rgba(107, 29, 29, 0.35);
      color: var(--bad);
    }

    .badge.is-wait {
      border-color: rgba(77, 61, 0, 0.35);
      color: var(--wait);
    }

    .metric-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 26px;
    }

    .metric {
      min-height: 82px;
      padding: 14px;
      border-right: 1px solid var(--line);
      background: var(--bg);
    }

    .metric:last-child {
      border-right: 0;
    }

    .metric-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .metric-value {
      display: block;
      margin-top: 7px;
      font-size: 22px;
      line-height: 1.15;
      font-weight: 760;
    }

    .metric-note {
      display: block;
      margin-top: 4px;
      color: var(--faint);
      font-size: 12px;
    }

    .section {
      border-top: 1px solid var(--line);
      padding: 24px 0;
    }

    .section:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .section-header {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 26px;
      align-items: start;
      margin-bottom: 16px;
    }

    .section-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.25;
      font-weight: 760;
    }

    .section-purpose {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .summary-text {
      margin: 0;
      font-size: 18px;
      line-height: 1.7;
    }

    .kv-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: var(--bg);
    }

    .kv {
      min-height: 74px;
      padding: 12px;
      background: var(--bg);
      box-shadow: inset -1px 0 0 var(--line), inset 0 -1px 0 var(--line);
    }

    .kv dt {
      margin: 0 0 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .kv dd {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .rank-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .rank-cell {
      min-height: 98px;
    }

    .rank-primary {
      display: block;
      font-size: 22px;
      line-height: 1.15;
      font-weight: 800;
    }

    .rank-meta {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 650;
    }

    .rank-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .merge-note {
      margin: 10px 0 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 11px;
      color: var(--muted);
      background: var(--surface);
      font-size: 12px;
      line-height: 1.55;
    }

    #session-context {
      border-top: 1px solid var(--line);
      padding-top: 24px;
    }

    .session-context-panel {
      border: 1px solid var(--line-strong);
      border-left: 5px solid var(--ink);
      border-radius: 6px;
      padding: 14px 16px;
      background: var(--surface);
    }

    .session-context-topline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .session-context-summary {
      margin: 10px 0 0;
      font-size: 15px;
      line-height: 1.65;
      font-weight: 650;
    }

    .session-context-grid {
      margin-top: 14px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .session-context-notes {
      margin-top: 16px;
    }

    .session-context-notes p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    #llm-review {
      border-top: 2px solid var(--ink);
      padding-top: 26px;
    }

    .llm-review-panel {
      border: 1px solid var(--ink);
      border-left-width: 5px;
      border-radius: 6px;
      padding: 16px 18px;
      background: var(--surface);
    }

    .llm-review-panel.is-error {
      border-color: rgba(107, 29, 29, 0.35);
    }

    .llm-review-summary {
      margin: 10px 0 0;
      font-size: 16px;
      line-height: 1.65;
      font-weight: 650;
    }

    .llm-review-topline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .llm-review-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .llm-active-view {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 14px 16px;
      background: var(--surface);
    }

    .llm-active-basis {
      margin: 10px 0 0;
      line-height: 1.65;
    }

    .llm-active-lists {
      margin-top: 12px;
    }

    .llm-active-boundary {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .llm-gamma-lens {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 14px 16px;
      background: var(--bg);
    }

    .llm-gamma-copy {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .llm-gamma-copy p,
    .llm-gamma-notes p {
      margin: 0;
      line-height: 1.65;
    }

    .llm-gamma-levels {
      margin-top: 12px;
    }

    .llm-gamma-notes {
      margin-top: 12px;
    }

    .llm-gamma-boundary {
      margin: 12px 0 0;
      border-top: 1px solid var(--line);
      padding-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .llm-review-quality {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--muted);
      background: var(--bg);
      font-size: 12px;
      line-height: 1.55;
    }

    .llm-review-lists {
      margin-top: 16px;
    }

    .llm-review-error {
      margin-top: 12px;
      color: var(--bad);
      font-size: 12px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .text-block {
      margin: 16px 0 0;
      border-left: 3px solid var(--ink);
      padding: 10px 0 10px 14px;
      color: var(--ink);
      background: var(--surface);
    }

    .text-block p {
      margin: 0;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 820px;
      background: var(--bg);
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 11px 12px;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      background: var(--surface);
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .num {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .reason {
      min-width: 260px;
    }

    .adjustment-list,
    .conflict-list,
    .focus-list,
    .audit-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .line-item {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 14px;
      background: var(--bg);
    }

    .line-title {
      margin: 0;
      font-weight: 760;
    }

    .line-body {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .change {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      background: var(--surface);
      color: var(--ink);
      font-weight: 650;
    }

    .raw-values {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
      gap: 5px;
      min-width: 0;
    }

    .raw-chip {
      display: grid;
      grid-template-columns: minmax(58px, auto) minmax(0, 1fr);
      gap: 5px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 4px 6px;
      background: var(--bg);
      color: var(--ink);
      font-size: 10.5px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .raw-chip strong {
      color: var(--muted);
      font-weight: 760;
    }

    .raw-chip span {
      min-width: 0;
      font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    .conflict-sides {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 12px 0;
    }

    .side {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: var(--surface);
    }

    .side-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .side-value {
      display: block;
      margin-top: 4px;
      font-weight: 700;
    }

    .focus-list {
      counter-reset: focus;
    }

    .focus-list li {
      position: relative;
      min-height: 40px;
      border-bottom: 1px solid var(--line);
      padding: 8px 0 8px 34px;
    }

    .focus-list li:last-child {
      border-bottom: 0;
    }

    .focus-list li::before {
      counter-increment: focus;
      content: counter(focus);
      position: absolute;
      left: 0;
      top: 8px;
      width: 22px;
      height: 22px;
      border: 1px solid var(--line-strong);
      border-radius: 50%;
      color: var(--muted);
      font-size: 12px;
      line-height: 20px;
      text-align: center;
    }

    .push-summary {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 14px;
      background: var(--surface);
      font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .audit-list li {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 16px;
      border-bottom: 1px solid var(--line);
      padding: 9px 0;
    }

    .audit-list li:last-child {
      border-bottom: 0;
    }

    .audit-key {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .audit-value {
      overflow-wrap: anywhere;
    }

    .empty {
      border: 1px dashed var(--line-strong);
      border-radius: 6px;
      padding: 18px;
      color: var(--muted);
      text-align: center;
    }

    .null-value {
      color: var(--bad);
      font-style: italic;
      font-weight: 650;
    }

    .benign-null-value {
      color: var(--muted);
      font-style: normal;
      font-weight: 650;
    }

    .subsection-title {
      margin: 20px 0 10px;
      font-size: 14px;
      font-weight: 760;
    }

    .layer-list,
    .plain-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .plain-list li {
      border-bottom: 1px solid var(--line);
      padding: 7px 0;
      overflow-wrap: anywhere;
    }

    .source-ref-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .two-column-notes {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
      margin-top: 18px;
    }

    .empty-inline {
      color: var(--muted);
      padding: 8px 0;
    }

    .formula-block {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr) minmax(0, 1fr);
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 13px;
      background: var(--surface);
      font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .source-table {
      min-width: 980px;
    }

    .evidence-ledger {
      display: grid;
      gap: 10px;
    }

    .evidence-item {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--bg);
      overflow: hidden;
    }

    .evidence-item-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .evidence-title {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .evidence-key {
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .evidence-gloss {
      color: var(--muted);
      font-size: 12px;
    }

    .evidence-status {
      flex: 0 0 auto;
    }

    .evidence-body {
      display: grid;
      grid-template-columns: 138px minmax(260px, 0.72fr) minmax(0, 1.28fr);
      gap: 12px;
      align-items: start;
      padding: 11px 12px 12px;
    }

    .evidence-stance {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .evidence-stance span,
    .evidence-impact em,
    .evidence-fact span {
      color: var(--muted);
      font-size: 11px;
      font-style: normal;
      font-weight: 760;
      line-height: 1.25;
    }

    .evidence-stance strong {
      font-size: 16px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .evidence-impact {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      min-width: 0;
    }

    .evidence-impact span {
      display: grid;
      gap: 3px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px 7px;
      background: var(--surface);
    }

    .evidence-impact strong {
      font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .evidence-judgement {
      grid-column: 3;
      margin: 0;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .evidence-facts {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding-top: 9px;
      border-top: 1px solid var(--line);
    }

    .evidence-fact {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--surface);
    }

    .evidence-fact strong {
      min-width: 0;
      font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 11px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .evidence-foot {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .evidence-item.participation-excluded,
    .evidence-item.participation-non_voting,
    .evidence-item.participation-gate_only {
      background: var(--surface);
    }

    .evidence-item.participation-excluded .evidence-item-head,
    .evidence-item.participation-non_voting .evidence-item-head,
    .evidence-item.participation-gate_only .evidence-item-head {
      background: #f1f1f1;
    }

    .evidence-table {
      min-width: 1180px;
    }

    .field-table {
      min-width: 620px;
    }

    .field-path {
      width: 42%;
      color: var(--muted);
      font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    code {
      font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    tr.participation-excluded td,
    tr.participation-non_voting td,
    tr.participation-gate_only td {
      background: var(--surface);
      color: var(--muted);
    }

    .factor-list {
      display: grid;
      gap: 10px;
    }

    .factor-detail {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--bg);
      overflow: hidden;
    }

    .factor-detail > summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 48px;
      padding: 10px 13px;
      cursor: pointer;
      font-weight: 760;
      list-style-position: inside;
    }

    .factor-detail[open] > summary {
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .factor-detail .table-wrap {
      border: 0;
      border-radius: 0;
    }

    @media (max-width: 980px) {
      .app {
        display: block;
      }

      .sidebar {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .workspace {
        padding: 24px 18px 36px;
      }

      .doc-header {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .status-stack {
        justify-content: flex-start;
      }

      .metric-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .evidence-body {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .evidence-impact {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .evidence-judgement,
      .evidence-facts,
      .evidence-foot {
        grid-column: 1;
      }

      .metric {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .metric:nth-child(odd) {
        border-right: 1px solid var(--line);
      }

      .metric:nth-last-child(-n + 1) {
        border-bottom: 0;
      }

      .section-header {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .kv-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .formula-block,
      .llm-gamma-copy,
      .two-column-notes {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .sidebar {
        padding: 18px 14px;
      }

      .workspace {
        padding: 20px 14px 34px;
      }

      .doc-title {
        font-size: 27px;
      }

      .metric-strip,
      .kv-grid,
      .conflict-sides {
        grid-template-columns: 1fr;
      }

      .metric:nth-child(odd) {
        border-right: 0;
      }

      .metric {
        min-height: 72px;
      }

      .audit-list li {
        grid-template-columns: 1fr;
        gap: 4px;
      }
    }
  </style>
</head>
